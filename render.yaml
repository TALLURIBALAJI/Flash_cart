services:
  - type: postgres
    name: flashcart-db
    plan: free
    databaseName: flash_cart_db

  - type: web_service
    name: flashcart-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          serviceName: flashcart-db
      - key: JWT_SECRET
        value: "<set-in-render>"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://flashcart-frontend.onrender.com"
    branch: main

  - type: static_site
    name: flashcart-frontend
    staticPublishPath: frontend/public
    branch: main
