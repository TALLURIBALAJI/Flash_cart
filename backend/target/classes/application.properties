# ============================================================================
# FLASH-CART SPRING BOOT APPLICATION CONFIGURATION v2.0
# ============================================================================

spring.application.name=flash-cart-backend
server.port=8080

# ============================================================================
# DATABASE CONFIGURATION — H2 (Local Dev) / PostgreSQL (Production)
# ============================================================================
# H2 In-Memory Database (default for local development)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:flashcartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# For PostgreSQL production, set these env vars:
# DATABASE_URL=jdbc:postgresql://localhost:5432/flash_cart_db
# DATABASE_USER=postgres
# DATABASE_PASSWORD=your_password
# DB_DRIVER=org.postgresql.Driver
# JPA_DIALECT=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ============================================================================
# JWT CONFIGURATION
# ============================================================================
jwt.secret=${JWT_SECRET:FlashCartSuperSecretKeyThatIsAtLeast256BitsLongForHMACSHA}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================================
# LOGGING
# ============================================================================
logging.level.root=INFO
logging.level.com.flashcart=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# ============================================================================
# JACKSON JSON
# ============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================================
# ERROR HANDLING
# ============================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ============================================================================
# SERVLET
# ============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
